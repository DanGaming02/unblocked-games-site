<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Game</title>

<style>

body{
margin:0;
background:black;
}

iframe{
width:100vw;
height:100vh;
border:none;
}

</style>

</head>

<body>

<iframe id="gameFrame"></iframe>

<script>

const params = new URLSearchParams(window.location.search);
const game = params.get("game");

if(game){
document.getElementById("gameFrame").src = game;
}

</script>

</body>
</html>
