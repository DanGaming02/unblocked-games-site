<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game</title>

<style>
body{
margin:0;
background:black;
}

iframe{
width:100vw;
height:100vh;
border:none;
}
</style>

</head>

<body>

<iframe id="gameFrame"></iframe>

<script>

const params = new URLSearchParams(window.location.search);
const gameURL = params.get("game");

if(gameURL){
document.getElementById("gameFrame").src = gameURL;
}

</script>

</body>
</html>
