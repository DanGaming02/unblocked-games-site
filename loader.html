<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Game Loader</title>

<style>
body{
background:black;
color:white;
font-family:Arial;
margin:0;
padding:20px;
}

h1{
text-align:center;
}

.controls{
display:flex;
flex-direction:column;
gap:10px;
max-width:800px;
margin:auto;
}

input, textarea{
width:100%;
padding:10px;
background:#111;
color:white;
border:1px solid #333;
}

button{
padding:10px;
background:#444;
color:white;
border:none;
cursor:pointer;
}

iframe{
width:100%;
height:80vh;
border:none;
margin-top:20px;
background:black;
}
</style>

</head>

<body>

<h1>Game Loader</h1>

<div class="controls">

<input id="urlInput" placeholder="Paste game URL here">

<button onclick="loadURL()">Load URL</button>

<textarea id="htmlInput" rows="8" placeholder="Paste game HTML here"></textarea>

<button onclick="loadHTML()">Load HTML</button>

</div>

<iframe id="gameFrame"></iframe>

<script>

function loadURL(){

const url = document.getElementById("urlInput").value;

document.getElementById("gameFrame").src = url;

}

function loadHTML(){

const html = document.getElementById("htmlInput").value;

const frame = document.getElementById("gameFrame");

frame.srcdoc = html;

}

</script>

</body>
</html>
