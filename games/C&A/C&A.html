<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABEL & CAINE</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
:root{--abel:#3a9fff;--caine:#ff2020;--bg:#050508;--ui:rgba(6,6,14,0.92);--border:rgba(255,255,255,0.08);}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:'Share Tech Mono',monospace;color:#c8c8e0;overflow:hidden;height:100vh;width:100vw;user-select:none;}
canvas{position:absolute;top:0;left:0;width:100%;height:100%;cursor:crosshair;}

/* ── TOP ── */
#topbar{position:absolute;top:14px;left:50%;transform:translateX(-50%);display:flex;gap:20px;align-items:center;background:var(--ui);border:1px solid var(--border);border-radius:3px;padding:8px 22px;backdrop-filter:blur(12px);z-index:10;pointer-events:none;}
.ai-stat{display:flex;flex-direction:column;align-items:center;gap:4px;min-width:120px;}
.ai-name{font-family:'Orbitron',monospace;font-weight:700;font-size:12px;letter-spacing:4px;}
.ai-name.abel{color:var(--abel);text-shadow:0 0 12px var(--abel);}
.ai-name.caine{color:var(--caine);text-shadow:0 0 12px var(--caine);}
.hpbar{width:120px;height:4px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden;}
.hpfill{height:100%;border-radius:2px;transition:width .1s;}
.hpfill.abel{background:var(--abel);box-shadow:0 0 5px var(--abel);}
.hpfill.caine{background:var(--caine);box-shadow:0 0 5px var(--caine);}
.shieldbar{width:120px;height:3px;background:rgba(255,255,255,0.05);border-radius:1px;overflow:hidden;margin-top:1px;}
.shieldfill{height:100%;border-radius:1px;transition:width .1s;}
.shieldfill.abel{background:rgba(58,159,255,.5);box-shadow:0 0 4px var(--abel);}
.shieldfill.caine{background:rgba(255,32,32,.5);box-shadow:0 0 4px var(--caine);}
.statrow{display:flex;gap:8px;align-items:center;font-size:9px;opacity:.45;letter-spacing:1px;}
.vs{font-family:'Orbitron',monospace;font-weight:900;font-size:16px;color:rgba(255,255,255,.18);}

/* ── PANEL ── */
#panel{position:absolute;left:14px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:7px;background:var(--ui);border:1px solid var(--border);border-radius:3px;padding:12px 10px;backdrop-filter:blur(12px);z-index:10;min-width:134px;}
.sec{font-family:'Orbitron',monospace;font-size:8px;letter-spacing:3px;color:rgba(255,255,255,.2);text-align:center;margin-bottom:1px;}
.btn{font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px;padding:7px 10px;border:1px solid var(--border);background:rgba(255,255,255,.03);color:#c8c8e0;cursor:pointer;border-radius:2px;transition:all .12s;text-align:center;}
.btn:hover{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.22);color:#fff;}
.btn.on{background:rgba(255,220,80,.12);border-color:#ffd840;color:#ffd840;box-shadow:0 0 10px rgba(255,216,64,.2);}
.btn-r{border-color:rgba(255,200,0,.25);color:#ffc800;}
.btn-r:hover{background:rgba(255,200,0,.08);border-color:#ffc800;}
.hr{height:1px;background:var(--border);margin:1px 0;}
.note{font-size:9px;color:rgba(255,255,255,.18);text-align:center;letter-spacing:1px;line-height:1.7;}

/* ── LOG ── */
#log{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);font-size:10px;letter-spacing:2px;color:rgba(255,255,255,.2);white-space:nowrap;pointer-events:none;z-index:10;transition:color .3s;}

/* ── WINNER ── */
#winner{position:absolute;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;gap:18px;background:rgba(0,0,0,.75);z-index:20;backdrop-filter:blur(8px);}
#winner.show{display:flex;}
#winner-name{font-family:'Orbitron',monospace;font-weight:900;font-size:52px;letter-spacing:10px;}
#winner-sub{font-size:11px;letter-spacing:5px;opacity:.35;}
#winner-btn{font-family:'Orbitron',monospace;font-size:11px;letter-spacing:4px;padding:11px 30px;border:1px solid currentColor;background:transparent;cursor:pointer;transition:background .2s;color:inherit;}
#winner-btn:hover{background:rgba(255,255,255,.08);}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="topbar">
  <div class="ai-stat">
    <div class="ai-name abel">ABEL</div>
    <div class="hpbar"><div class="hpfill abel" id="abel-hp" style="width:100%"></div></div>
    <div class="shieldbar"><div class="shieldfill abel" id="abel-sh" style="width:0%"></div></div>
    <div class="statrow"><span id="abel-hpv">HP 100</span><span id="abel-shv">SH 0</span></div>
  </div>
  <div class="vs">VS</div>
  <div class="ai-stat">
    <div class="ai-name caine">CAINE</div>
    <div class="hpbar"><div class="hpfill caine" id="caine-hp" style="width:100%"></div></div>
    <div class="shieldbar"><div class="shieldfill caine" id="caine-sh" style="width:0%"></div></div>
    <div class="statrow"><span id="caine-hpv">HP 100</span><span id="caine-shv">SH 0</span></div>
  </div>
</div>

<div id="panel">
  <div class="sec">KNOWLEDGE</div>
  <button class="btn" id="btn-know" onclick="toggleKnowledge()">⬡ INJECT OFF</button>
  <div class="hr"></div>
  <div class="sec">INTERACT</div>
  <div class="note">Drag either<br>orb to reposition</div>
  <div class="hr"></div>
  <button class="btn btn-r" onclick="resetAll()">↺ RESET</button>
</div>

<div id="log">INITIALIZING ENTITIES…</div>

<div id="winner">
  <div id="winner-name"></div>
  <div id="winner-sub">ENTITY PERSISTS</div>
  <button id="winner-btn" onclick="resetAll()">↺ REINITIALIZE</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W, H;
function resize(){ W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize(); window.addEventListener('resize', resize);

const rnd  = (a,b) => a + Math.random()*(b-a);
const rndI = (a,b) => Math.floor(rnd(a,b));

// ─────────────────────────────────
//  GLOBALS
// ─────────────────────────────────
let t = 0, gameOver = false, fighting = false;
let dragging = null, dragOffX = 0, dragOffY = 0;
let knowledgeOn = false;         // toggle
let fightInterval = null;
let fightIntensity = 0;          // grows while fighting

const knowledge = [];            // "food" nodes renamed
const particles = [];
const glitchRects = [];
const eatFlashes  = [];
const shieldNodes = [];          // built structures around AIs

const MAX_KNOW   = 30;
const AUTO_SPAWN = 100;          // frames between auto-spawns
let spawnClock   = 0;

// knowledge types & their "build value"
const KTYPES = [
  { id:'data',     label:'DATA',     color:'#88ffcc', buildVal:1,  defVal:0.5 },
  { id:'logic',    label:'LOGIC',    color:'#ffff88', buildVal:1.5,defVal:1   },
  { id:'memory',   label:'MEMORY',   color:'#cc88ff', buildVal:1,  defVal:1.5 },
  { id:'protocol', label:'PROTOCOL', color:'#88ccff', buildVal:0.5,defVal:2   },
  { id:'cipher',   label:'CIPHER',   color:'#ffcc66', buildVal:2,  defVal:0.8 },
];

// ─────────────────────────────────
//  AIs
// ─────────────────────────────────
function makeAI(name, color){
  return {
    name, color,
    x:0, y:0, vx:0, vy:0,
    size: 18,
    hp: 100, maxHp: 100,
    shield: 0, maxShield: 60,
    alive: true, trail: [],
    wanderAngle: Math.random()*Math.PI*2, wanderTimer: 0,
    eatFlash: 0, gox:0, goy:0,
    buildLevel: 0,    // total knowledge absorbed
    defLevel: 0,      // total defense knowledge absorbed
    glitchSeed: Math.random()*1000,
  };
}
let abel  = makeAI('ABEL',  '#3a9fff');
let caine = makeAI('CAINE', '#ff2020');

function placeAIs(){
  abel.x  = W*.30; abel.y = H*.5;
  caine.x = W*.70; caine.y = H*.5;
}

// ─────────────────────────────────
//  KNOWLEDGE NODES
// ─────────────────────────────────
function spawnKnowledge(x, y){
  if(knowledge.length >= MAX_KNOW) return;
  const kt = KTYPES[rndI(0, KTYPES.length)];
  knowledge.push({
    x: x ?? rnd(80, W-80),
    y: y ?? rnd(80, H-80),
    ...kt,
    size: rnd(5,11),
    pulse: Math.random()*Math.PI*2,
    rot: 0,
    gp: Math.random()*Math.PI*2,
    age: 0,
  });
}
function seedKnowledge(){ for(let i=0;i<10;i++) spawnKnowledge(); }

// ─────────────────────────────────
//  SHIELD NODES  (orbital structures built around AIs)
// ─────────────────────────────────
function addShieldNode(ai, kt){
  // each absorbed knowledge adds an orbital shard to the AI
  const angle = rnd(0, Math.PI*2);
  const dist  = ai.size + 10 + shieldNodes.filter(s=>s.ai===ai).length * 3.5;
  shieldNodes.push({
    ai,
    angle,
    dist: Math.min(dist, ai.size + 55),
    size: 3 + kt.defVal * 1.5,
    color: kt.color,
    angSpeed: rnd(0.008, 0.022) * (Math.random()>.5?1:-1),
    opacity: 0.7,
    life: 1,
    type: kt.id,
  });
}

// ─────────────────────────────────
//  PARTICLES
// ─────────────────────────────────
function burst(x, y, color, n=10, opts={}){
  for(let i=0;i<n;i++){
    const a=rnd(0,Math.PI*2), spd=opts.fast?rnd(3,9):rnd(1,4);
    particles.push({ x, y,
      vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
      color, life:1, decay:rnd(.015,.038),
      size:rnd(1.5, opts.big?6:3.5), sq:opts.sq||false });
  }
}

function glitchBurstFX(x, y, intensity=1){
  const n = Math.floor(30 * intensity);
  const cols=['#ff2020','#3a9fff','#fff','#f0f','#0ff','#ff0','#0f0'];
  for(let i=0;i<n;i++){
    const a=rnd(0,Math.PI*2), spd=rnd(1,8*intensity);
    particles.push({ x:x+rnd(-30,30)*intensity, y:y+rnd(-30,30)*intensity,
      vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
      color:cols[rndI(0,cols.length)],
      life:1, decay:rnd(.018,.05), size:rnd(1,6*intensity), sq:true });
  }
  // glitch bars
  const bars = Math.floor(8 * intensity);
  for(let i=0;i<bars;i++){
    const gc=cols[rndI(0,cols.length)];
    glitchRects.push({
      x:x+rnd(-100,100)*intensity, y:y+rnd(-50,50)*intensity,
      w:rnd(20,200*intensity), h:rnd(2,12),
      color:gc, life:1, decay:rnd(.04,.14), alpha:rnd(.2,.7)
    });
  }
}

// ─────────────────────────────────
//  EAT FX  (glitchy knowledge absorption)
// ─────────────────────────────────
function absorbFX(x, y, fc, ac, kt){
  eatFlashes.push({ x, y, r:0, color:ac, alpha:1 });
  burst(x, y, fc, 18, { sq:true });
  burst(x, y, ac,  8, { sq:true });
  // data stream lines
  for(let i=0;i<8;i++){
    glitchRects.push({
      x:x+rnd(-120,120), y:y+rnd(-6,6),
      w:rnd(40,200), h:rnd(1,5),
      color:fc, life:1, decay:rnd(.07,.20), alpha:rnd(.35,.8)
    });
  }
  for(let i=0;i<3;i++){
    glitchRects.push({
      x:x+rnd(-25,25), y:y+rnd(-60,0),
      w:rnd(2,7), h:rnd(20,90),
      color:fc, life:1, decay:rnd(.09,.22), alpha:rnd(.2,.5)
    });
  }
  // floating label
  particles.push({
    x, y: y-20,
    vx:rnd(-.3,.3), vy:-1.2,
    color:fc, life:1, decay:.022,
    size:0, sq:false,
    label: kt.label,
  });
}

// ─────────────────────────────────
//  AI LOGIC
// ─────────────────────────────────
function updateAI(ai){
  if(!ai.alive || dragging===ai) return;

  let nearest=null, nd=Infinity;
  for(const k of knowledge){
    const d=Math.hypot(k.x-ai.x, k.y-ai.y);
    if(d<nd){ nd=d; nearest=k; }
  }

  if(nearest && nd < 350){
    const dx=nearest.x-ai.x, dy=nearest.y-ai.y;
    const len=Math.hypot(dx,dy)||1;
    ai.vx+=(dx/len)*.38; ai.vy+=(dy/len)*.38;
    ai.wanderAngle=Math.atan2(dy,dx);
  } else {
    ai.wanderTimer--;
    if(ai.wanderTimer<=0){ ai.wanderAngle+=rnd(-.9,.9); ai.wanderTimer=rndI(30,90); }
    ai.vx+=Math.cos(ai.wanderAngle)*.22;
    ai.vy+=Math.sin(ai.wanderAngle)*.22;
  }

  ai.vx*=.91; ai.vy*=.91;
  const spd=Math.hypot(ai.vx,ai.vy), mx=fighting?1.4:2.8;
  if(spd>mx){ ai.vx=ai.vx/spd*mx; ai.vy=ai.vy/spd*mx; }
  ai.x+=ai.vx; ai.y+=ai.vy;

  if(ai.x<ai.size){  ai.x=ai.size;    ai.vx*=-.6; ai.wanderAngle=rnd(-.5,.5); }
  if(ai.x>W-ai.size){ai.x=W-ai.size;  ai.vx*=-.6; ai.wanderAngle=Math.PI+rnd(-.5,.5); }
  if(ai.y<ai.size){  ai.y=ai.size;    ai.vy*=-.6; ai.wanderAngle=rnd(0,Math.PI); }
  if(ai.y>H-ai.size){ai.y=H-ai.size;  ai.vy*=-.6; ai.wanderAngle=rnd(-Math.PI,0); }
}

function checkAbsorb(ai){
  if(!ai.alive) return;
  for(let i=knowledge.length-1;i>=0;i--){
    const k=knowledge[i];
    if(Math.hypot(k.x-ai.x, k.y-ai.y) < ai.size+k.size*.7){
      absorbFX(k.x, k.y, k.color, ai.color, k);
      knowledge.splice(i,1);
      ai.hp = Math.min(ai.maxHp, ai.hp + k.buildVal*2);
      ai.shield = Math.min(ai.maxShield, ai.shield + k.defVal*3);
      ai.buildLevel += k.buildVal;
      ai.defLevel   += k.defVal;
      ai.eatFlash = 16;
      addShieldNode(ai, k);
      updateHUD();
    }
  }
}

// ─────────────────────────────────
//  FIGHT
// ─────────────────────────────────
function checkCollision(){
  if(!abel.alive||!caine.alive||gameOver) return;
  const d=Math.hypot(caine.x-abel.x, caine.y-abel.y);
  if(d < abel.size+caine.size+4){ if(!fighting) startFight(); }
  else { if(fighting) stopFight(); }
}

function startFight(){
  fighting=true; fightIntensity=0;
  setLog('⚡ COLLISION — ENTITIES DESTABILIZING','rgba(255,80,255,.9)');
  if(fightInterval) clearInterval(fightInterval);
  fightInterval = setInterval(()=>{
    if(gameOver||!fighting){ clearInterval(fightInterval); return; }
    fightIntensity = Math.min(3.5, fightIntensity + 0.06);

    const mx=(abel.x+caine.x)/2, my=(abel.y+caine.y)/2;
    glitchBurstFX(mx, my, fightIntensity);

    // Secondary blasts at both orbs individually
    if(Math.random()<.5) glitchBurstFX(abel.x+rnd(-10,10), abel.y+rnd(-10,10), fightIntensity*.7);
    if(Math.random()<.5) glitchBurstFX(caine.x+rnd(-10,10), caine.y+rnd(-10,10), fightIntensity*.7);

    // Push them apart
    const ang=Math.atan2(caine.y-abel.y, caine.x-abel.x);
    abel.vx  += -Math.cos(ang)*rnd(.6,2.5); abel.vy  += -Math.sin(ang)*rnd(.6,2.5);
    caine.vx +=  Math.cos(ang)*rnd(.6,2.5); caine.vy +=  Math.sin(ang)*rnd(.6,2.5);

    // Glitch offsets scale with intensity
    const gOff = 4 + fightIntensity * 5;
    abel.gox=rnd(-gOff,gOff);  abel.goy=rnd(-gOff,gOff);
    caine.gox=rnd(-gOff,gOff); caine.goy=rnd(-gOff,gOff);

    // Damage — shield absorbs first
    let dmgToAbel  = rnd(.6,2.8) * (1 + fightIntensity*.2);
    let dmgToCaine = rnd(.6,2.8) * (1 + fightIntensity*.2);

    // shield mitigation
    if(abel.shield > 0){
      const blk=Math.min(abel.shield, dmgToAbel*.7);
      abel.shield  -= blk; dmgToAbel -= blk;
    }
    if(caine.shield > 0){
      const blk=Math.min(caine.shield, dmgToCaine*.7);
      caine.shield -= blk; dmgToCaine -= blk;
    }

    abel.hp  -= dmgToAbel;
    caine.hp -= dmgToCaine;
    abel.hp  = Math.max(0, abel.hp);
    caine.hp = Math.max(0, caine.hp);

    // Destroy shield nodes over time
    if(Math.random()<.15 && shieldNodes.length){
      const sn=shieldNodes.findIndex(s=>s.ai===abel||s.ai===caine);
      if(sn>=0) shieldNodes.splice(sn,1);
    }

    updateHUD();
    if(abel.hp<=0||caine.hp<=0){ clearInterval(fightInterval); resolveBattle(); }
  }, 70);
}

function stopFight(){
  fighting=false; fightIntensity=0;
  abel.gox=abel.goy=caine.gox=caine.goy=0;
  if(fightInterval){ clearInterval(fightInterval); fightInterval=null; }
  setLog('ENTITIES SEPARATED — RESUMING NOMINAL BEHAVIOR');
}

function resolveBattle(){
  gameOver=true; fighting=false; fightIntensity=0;
  abel.gox=abel.goy=caine.gox=caine.goy=0;
  let winner;
  if(abel.hp<=0){  abel.alive=false;  winner=caine; burst(abel.x,  abel.y,  '#3a9fff',60,{fast:true,big:true}); }
  else           { caine.alive=false; winner=abel;  burst(caine.x, caine.y, '#ff2020',60,{fast:true,big:true}); }
  // Extra shockwave rects
  for(let i=0;i<20;i++){
    const c=['#ff2020','#3a9fff','#fff','#f0f'][rndI(0,4)];
    glitchRects.push({ x:rnd(0,W), y:rnd(0,H), w:rnd(40,300), h:rnd(2,10), color:c, life:1, decay:.04, alpha:rnd(.3,.7) });
  }
  updateHUD();
  setTimeout(()=>{
    const nm=document.getElementById('winner-name');
    nm.textContent=winner.name;
    nm.style.color=winner.color;
    nm.style.textShadow=`0 0 60px ${winner.color},0 0 120px ${winner.color}`;
    document.getElementById('winner-btn').style.color=winner.color;
    document.getElementById('winner').classList.add('show');
  }, 1000);
}

// ─────────────────────────────────
//  AUTO SPAWN
// ─────────────────────────────────
function autoSpawn(){
  spawnClock++;
  if(spawnClock>=AUTO_SPAWN){ spawnClock=0; if(knowledge.length<MAX_KNOW) spawnKnowledge(); }
  // If knowledge inject is ON, also sprinkle near cursor every few frames
  if(knowledgeOn && t % 6 === 0 && knowledge.length < MAX_KNOW){
    spawnKnowledge(
      clampX(lastMX + rnd(-60,60)),
      clampY(lastMY + rnd(-60,60))
    );
  }
}
function clampX(x){ return Math.max(40, Math.min(W-40, x)); }
function clampY(y){ return Math.max(40, Math.min(H-40, y)); }

// ─────────────────────────────────
//  HUD
// ─────────────────────────────────
function updateHUD(){
  const ah=Math.max(0,abel.hp),  ch=Math.max(0,caine.hp);
  const as=Math.max(0,abel.shield), cs=Math.max(0,caine.shield);
  document.getElementById('abel-hp').style.width  =(ah/abel.maxHp*100)+'%';
  document.getElementById('caine-hp').style.width =(ch/caine.maxHp*100)+'%';
  document.getElementById('abel-sh').style.width  =(as/abel.maxShield*100)+'%';
  document.getElementById('caine-sh').style.width =(cs/caine.maxShield*100)+'%';
  document.getElementById('abel-hpv').textContent  ='HP '+Math.round(ah);
  document.getElementById('caine-hpv').textContent ='HP '+Math.round(ch);
  document.getElementById('abel-shv').textContent  ='SH '+Math.round(as);
  document.getElementById('caine-shv').textContent ='SH '+Math.round(cs);
}

const LOG_IDLE=['ENTITIES FORAGING — KNOWLEDGE DETECTED','AUTONOMOUS BEHAVIOR NOMINAL','PROCESSING ENVIRONMENTAL DATA…','SCANNING FOR KNOWLEDGE NODES…','PATHFINDING ACTIVE — BUILDING DEFENSES','SHIELD MATRIX STABILIZING'];
let logTick=0;
function setLog(msg, color='rgba(255,255,255,.22)'){
  const el=document.getElementById('log'); el.textContent=msg; el.style.color=color;
}
function tickLog(){ logTick++; if(logTick%240===0&&!fighting&&!gameOver) setLog(LOG_IDLE[rndI(0,LOG_IDLE.length)]); }

// ─────────────────────────────────
//  CONTROLS
// ─────────────────────────────────
function toggleKnowledge(){
  knowledgeOn=!knowledgeOn;
  const btn=document.getElementById('btn-know');
  btn.textContent = knowledgeOn ? '⬡ INJECT ON' : '⬡ INJECT OFF';
  btn.classList.toggle('on', knowledgeOn);
  canvas.style.cursor = knowledgeOn ? 'cell' : 'crosshair';
  setLog(knowledgeOn ? 'KNOWLEDGE INJECTION ACTIVE — MOVE CURSOR TO SEED' : 'KNOWLEDGE INJECTION HALTED');
}

function resetAll(){
  gameOver=false; fighting=false; fightIntensity=0;
  if(fightInterval){ clearInterval(fightInterval); fightInterval=null; }
  knowledge.length=0; particles.length=0; glitchRects.length=0;
  eatFlashes.length=0; shieldNodes.length=0;
  abel=makeAI('ABEL','#3a9fff'); caine=makeAI('CAINE','#ff2020');
  placeAIs(); seedKnowledge(); spawnClock=0;
  knowledgeOn=false;
  const btn=document.getElementById('btn-know');
  btn.textContent='⬡ INJECT OFF'; btn.classList.remove('on');
  canvas.style.cursor='crosshair';
  document.getElementById('winner').classList.remove('show');
  updateHUD(); setLog('ENTITIES REINITIALIZED');
}

// ─────────────────────────────────
//  INPUT
// ─────────────────────────────────
let lastMX=W*.5, lastMY=H*.5;

function getAIAt(mx,my){
  for(const ai of [abel,caine])
    if(ai.alive && Math.hypot(mx-ai.x,my-ai.y)<ai.size+12) return ai;
  return null;
}

canvas.addEventListener('mousemove', e=>{
  const r=canvas.getBoundingClientRect();
  lastMX=e.clientX-r.left; lastMY=e.clientY-r.top;
  if(dragging){ dragging.x=lastMX-dragOffX; dragging.y=lastMY-dragOffY; dragging.vx=dragging.vy=0; }
});
canvas.addEventListener('mousedown', e=>{
  if(gameOver) return;
  const r=canvas.getBoundingClientRect(), mx=e.clientX-r.left, my=e.clientY-r.top;
  const hit=getAIAt(mx,my);
  if(hit){ dragging=hit; dragOffX=mx-hit.x; dragOffY=my-hit.y; }
  // If knowledge is ON, clicking also drops a cluster
  else if(knowledgeOn){
    for(let i=0;i<5;i++) spawnKnowledge(clampX(mx+rnd(-40,40)), clampY(my+rnd(-40,40)));
  }
});
canvas.addEventListener('mouseup', ()=>{ dragging=null; });
canvas.addEventListener('mouseleave', ()=>{ dragging=null; });

canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  if(gameOver) return;
  const t0=e.touches[0], r=canvas.getBoundingClientRect();
  const mx=t0.clientX-r.left, my=t0.clientY-r.top;
  lastMX=mx; lastMY=my;
  const hit=getAIAt(mx,my);
  if(hit){ dragging=hit; dragOffX=mx-hit.x; dragOffY=my-hit.y; }
  else if(knowledgeOn){ for(let i=0;i<5;i++) spawnKnowledge(clampX(mx+rnd(-40,40)),clampY(my+rnd(-40,40))); }
},{passive:false});
canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  const t0=e.touches[0], r=canvas.getBoundingClientRect();
  lastMX=t0.clientX-r.left; lastMY=t0.clientY-r.top;
  if(dragging){ dragging.x=lastMX-dragOffX; dragging.y=lastMY-dragOffY; dragging.vx=dragging.vy=0; }
},{passive:false});
canvas.addEventListener('touchend', ()=>{ dragging=null; });

// ─────────────────────────────────
//  DRAW — GRID
// ─────────────────────────────────
function drawGrid(){
  const s=46;
  ctx.lineWidth=.5;
  ctx.strokeStyle='rgba(255,255,255,.04)';
  ctx.beginPath();
  for(let x=0;x<W;x+=s){ctx.moveTo(x,0);ctx.lineTo(x,H);}
  for(let y=0;y<H;y+=s){ctx.moveTo(0,y);ctx.lineTo(W,y);}
  ctx.stroke();
  ctx.strokeStyle='rgba(255,255,255,.09)';
  ctx.beginPath();
  for(let x=0;x<W;x+=s*4){ctx.moveTo(x,0);ctx.lineTo(x,H);}
  for(let y=0;y<H;y+=s*4){ctx.moveTo(0,y);ctx.lineTo(W,y);}
  ctx.stroke();
}

// ─────────────────────────────────
//  DRAW — KNOWLEDGE NODES
// ─────────────────────────────────
function drawKnowledge(k){
  k.pulse+=.04; k.rot+=.014; k.gp+=.065; k.age++;
  const s=k.size+Math.sin(k.pulse)*1.8;
  const jx=Math.random()<.05?rnd(-3,3):0;
  const jy=Math.random()<.05?rnd(-2,2):0;

  ctx.save();
  ctx.translate(k.x+jx, k.y+jy);
  ctx.rotate(k.rot);
  ctx.shadowBlur=16; ctx.shadowColor=k.color;
  ctx.globalAlpha=.92;

  // RGB ghost split
  if(Math.sin(k.gp)>.88){
    ctx.globalAlpha=.18;
    ctx.fillStyle='#f00'; ctx.beginPath(); shp(ctx, k.id, s+2); ctx.fill();
    ctx.fillStyle='#00f'; ctx.translate(3,0); ctx.beginPath(); shp(ctx, k.id, s); ctx.fill(); ctx.translate(-3,0);
    ctx.globalAlpha=.92; ctx.fillStyle=k.color;
  }

  ctx.fillStyle=k.color;
  ctx.strokeStyle='rgba(255,255,255,.3)';
  ctx.lineWidth=1;
  ctx.beginPath(); shp(ctx, k.id, s); ctx.fill(); ctx.stroke();

  // knowledge type label
  ctx.globalAlpha=.45;
  ctx.font=`7px 'Share Tech Mono'`; ctx.textAlign='center'; ctx.fillStyle='#fff';
  ctx.shadowBlur=3; ctx.shadowColor=k.color;
  ctx.rotate(-k.rot);
  ctx.fillText(k.label, 0, s+9);

  ctx.restore();
}

function shp(ctx, type, s){
  switch(type){
    case'data':     ctx.arc(0,0,s,0,Math.PI*2); break;
    case'logic':    ctx.rect(-s,-s,s*2,s*2); break;
    case'memory':   ctx.moveTo(0,-s*1.2);ctx.lineTo(s*1.1,s*.7);ctx.lineTo(-s*1.1,s*.7);ctx.closePath(); break;
    case'protocol': ctx.moveTo(0,-s*1.3);ctx.lineTo(s*.9,0);ctx.lineTo(0,s*1.3);ctx.lineTo(-s*.9,0);ctx.closePath(); break;
    case'cipher':   for(let i=0;i<6;i++){const a=(Math.PI/3)*i;i===0?ctx.moveTo(Math.cos(a)*s,Math.sin(a)*s):ctx.lineTo(Math.cos(a)*s,Math.sin(a)*s);}ctx.closePath(); break;
  }
}

// ─────────────────────────────────
//  DRAW — SHIELD NODES
// ─────────────────────────────────
function drawShieldNodes(){
  for(let i=shieldNodes.length-1;i>=0;i--){
    const sn=shieldNodes[i];
    if(!sn.ai.alive){ shieldNodes.splice(i,1); continue; }
    sn.angle+=sn.angSpeed;
    const ox=Math.cos(sn.angle)*sn.dist + sn.ai.gox;
    const oy=Math.sin(sn.angle)*sn.dist + sn.ai.goy;
    const x=sn.ai.x+ox, y=sn.ai.y+oy;

    ctx.save();
    ctx.globalAlpha=sn.opacity*(fighting ? .5+Math.random()*.5 : .85);
    ctx.shadowBlur=8; ctx.shadowColor=sn.color;
    ctx.fillStyle=sn.color;
    ctx.strokeStyle='rgba(255,255,255,.2)';
    ctx.lineWidth=.7;
    ctx.translate(x,y);
    ctx.rotate(sn.angle*2);
    ctx.beginPath(); shp(ctx, sn.type, sn.size); ctx.fill(); ctx.stroke();
    ctx.restore();

    // draw connecting line to AI
    ctx.save();
    ctx.globalAlpha=.07*(fighting?Math.random():1);
    ctx.strokeStyle=sn.color; ctx.lineWidth=.5;
    ctx.beginPath(); ctx.moveTo(sn.ai.x+sn.ai.gox, sn.ai.y+sn.ai.goy); ctx.lineTo(x,y); ctx.stroke();
    ctx.restore();
  }
}

// ─────────────────────────────────
//  DRAW — AI ORB
// ─────────────────────────────────
function drawAI(ai){
  if(!ai.alive) return;
  ai.trail.push({x:ai.x,y:ai.y});
  if(ai.trail.length>32) ai.trail.shift();

  ctx.save();
  for(let i=1;i<ai.trail.length;i++){
    const f=i/ai.trail.length;
    ctx.globalAlpha=f*.2;
    ctx.beginPath();
    ctx.arc(ai.trail[i].x, ai.trail[i].y, f*ai.size*.6, 0, Math.PI*2);
    ctx.fillStyle=ai.color; ctx.fill();
  }
  ctx.restore();

  // fight: extra RGB echo trails
  if(fighting){
    const off=fightIntensity*3;
    ctx.save();
    ctx.globalAlpha=.15*fightIntensity;
    ctx.fillStyle='#f00';
    ctx.beginPath(); ctx.arc(ai.x+off, ai.y, ai.size, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='#0ff';
    ctx.beginPath(); ctx.arc(ai.x-off, ai.y, ai.size, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  const gx=ai.x+ai.gox, gy=ai.y+ai.goy;
  ctx.save();

  // eat flash ring
  if(ai.eatFlash>0){
    ai.eatFlash--;
    const ef=ai.eatFlash/16;
    ctx.beginPath(); ctx.arc(gx,gy, ai.size+(1-ef)*22, 0, Math.PI*2);
    ctx.strokeStyle=ai.color; ctx.globalAlpha=ef*.9; ctx.lineWidth=3; ctx.stroke();
    ctx.globalAlpha=ef*.3; ctx.strokeStyle='#fff'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(gx+3,gy, ai.size+(1-ef)*16, 0, Math.PI*2); ctx.stroke();
    for(let n=0;n<8;n++){
      ctx.fillStyle=Math.random()>.5?ai.color:'#fff';
      ctx.globalAlpha=ef*.7*Math.random();
      ctx.fillRect(gx+rnd(-ai.size*2,ai.size*2), gy+rnd(-ai.size*2,ai.size*2), rnd(2,7), rnd(1,4));
    }
  }

  // fight pulse rings — scale with intensity
  if(fighting){
    const rings=Math.ceil(fightIntensity);
    for(let r=0;r<rings;r++){
      const pr=ai.size+8+Math.sin(t*.4+r*1.2)*6+r*8;
      ctx.beginPath(); ctx.arc(gx+rnd(-1,1),gy+rnd(-1,1),pr,0,Math.PI*2);
      ctx.strokeStyle=ai.color; ctx.globalAlpha=(.3-r*.06)+Math.random()*.3;
      ctx.lineWidth=1.5-r*.2; ctx.stroke();
    }
    // shield glow during fight — if they still have shield
    if(ai.shield>5){
      ctx.beginPath(); ctx.arc(gx,gy, ai.size+ai.defLevel*.5+6, 0, Math.PI*2);
      ctx.strokeStyle='#fff'; ctx.globalAlpha=.08+Math.random()*.08;
      ctx.lineWidth=2; ctx.setLineDash([3,6]); ctx.stroke();
      ctx.setLineDash([]);
    }
  }

  // halo
  const g=ctx.createRadialGradient(gx,gy,ai.size*.2,gx,gy,ai.size*2.8);
  g.addColorStop(0,ai.color+'bb'); g.addColorStop(1,ai.color+'00');
  ctx.beginPath(); ctx.arc(gx,gy,ai.size*2.8,0,Math.PI*2);
  ctx.fillStyle=g; ctx.globalAlpha=.5; ctx.fill();

  // core
  ctx.globalAlpha=1;
  ctx.shadowBlur=fighting?40+fightIntensity*15+Math.random()*20:22;
  ctx.shadowColor=ai.color;
  ctx.beginPath(); ctx.arc(gx,gy,ai.size,0,Math.PI*2);
  ctx.fillStyle=ai.color; ctx.fill();

  // specular
  const hg=ctx.createRadialGradient(gx-ai.size*.35,gy-ai.size*.35,1,gx,gy,ai.size);
  hg.addColorStop(0,'rgba(255,255,255,.55)'); hg.addColorStop(1,'rgba(255,255,255,0)');
  ctx.beginPath(); ctx.arc(gx,gy,ai.size,0,Math.PI*2); ctx.fillStyle=hg; ctx.fill();

  // label
  ctx.globalAlpha=fighting?.4+Math.random()*.6:.75;
  ctx.font='10px "Share Tech Mono"'; ctx.fillStyle='#fff'; ctx.textAlign='center';
  ctx.shadowBlur=5; ctx.shadowColor=ai.color;
  ctx.fillText(ai.name, gx, gy-ai.size-8);

  ctx.restore();
}

// ─────────────────────────────────
//  DRAW — PARTICLES + RECTS
// ─────────────────────────────────
function drawParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=.035; p.vx*=.97; p.vy*=.97;
    p.life-=p.decay;
    if(p.life<=0){particles.splice(i,1);continue;}
    ctx.save(); ctx.globalAlpha=p.life;
    ctx.shadowBlur=5; ctx.shadowColor=p.color; ctx.fillStyle=p.color;
    if(p.label){
      ctx.font=`8px 'Share Tech Mono'`; ctx.textAlign='center';
      ctx.fillText(p.label, p.x, p.y);
    } else if(p.sq){
      ctx.fillRect(p.x-p.size*.5, p.y-p.size*.5, p.size, p.size);
    } else {
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
}

function drawGlitchRects(){
  for(let i=glitchRects.length-1;i>=0;i--){
    const g=glitchRects[i]; g.life-=g.decay;
    if(g.life<=0){glitchRects.splice(i,1);continue;}
    ctx.save(); ctx.globalAlpha=g.life*g.alpha; ctx.fillStyle=g.color;
    ctx.fillRect(g.x,g.y,g.w,g.h); ctx.restore();
  }
}

function drawEatFlashes(){
  for(let i=eatFlashes.length-1;i>=0;i--){
    const ef=eatFlashes[i]; ef.r+=4; ef.alpha-=.055;
    if(ef.alpha<=0){eatFlashes.splice(i,1);continue;}
    ctx.save(); ctx.globalAlpha=ef.alpha; ctx.strokeStyle=ef.color;
    ctx.lineWidth=2; ctx.shadowBlur=14; ctx.shadowColor=ef.color;
    ctx.beginPath(); ctx.arc(ef.x,ef.y,ef.r,0,Math.PI*2); ctx.stroke();
    ctx.restore();
  }
}

// ─────────────────────────────────
//  DRAW — SCREEN GLITCH (fight)
// ─────────────────────────────────
function drawScreenGlitch(){
  if(!fighting) return;
  const chance = .25 + fightIntensity*.15;

  // scanlines
  const bars = Math.floor(fightIntensity*3);
  for(let i=0;i<bars;i++){
    if(Math.random()<chance){
      ctx.save(); ctx.globalAlpha=rnd(.04,.15)*fightIntensity*.5;
      ctx.fillStyle=`hsl(${rnd(0,360)},100%,60%)`;
      ctx.fillRect(0,rnd(0,H),W,rnd(1,12)); ctx.restore();
    }
  }

  // strip displacement
  const strips = Math.floor(fightIntensity*2);
  for(let i=0;i<strips;i++){
    if(Math.random()<.18){
      const sy=rnd(0,H-60), sh=rnd(4,50), shift=rnd(-25,25)*fightIntensity*.5;
      try{
        const id=ctx.getImageData(0,sy,W,sh);
        ctx.save(); ctx.globalAlpha=.6; ctx.putImageData(id,shift,sy); ctx.restore();
      }catch(e){}
    }
  }

  // vignette flicker
  if(Math.random()<fightIntensity*.1){
    ctx.save();
    const vg=ctx.createRadialGradient(W*.5,H*.5,H*.2,W*.5,H*.5,H*.85);
    vg.addColorStop(0,'rgba(0,0,0,0)');
    const col=Math.random()>.5?'rgba(255,0,100,':'rgba(0,100,255,';
    vg.addColorStop(1,col+(fightIntensity*.08)+')');
    ctx.fillStyle=vg; ctx.fillRect(0,0,W,H);
    ctx.restore();
  }

  // full-screen flash at peak intensity
  if(fightIntensity>2.5 && Math.random()<.04){
    ctx.save(); ctx.globalAlpha=rnd(.03,.08)*fightIntensity;
    ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
    ctx.restore();
  }
}

// cursor glow when knowledge is ON
function drawCursorGlow(){
  if(!knowledgeOn) return;
  ctx.save();
  const cg=ctx.createRadialGradient(lastMX,lastMY,0,lastMX,lastMY,40);
  cg.addColorStop(0,'rgba(255,216,64,.18)'); cg.addColorStop(1,'rgba(255,216,64,0)');
  ctx.fillStyle=cg; ctx.fillRect(lastMX-40,lastMY-40,80,80);
  ctx.restore();
}

// ─────────────────────────────────
//  MAIN LOOP
// ─────────────────────────────────
function loop(){
  t++;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#050508'; ctx.fillRect(0,0,W,H);

  drawGrid();
  drawGlitchRects();
  drawEatFlashes();

  if(!gameOver){
    autoSpawn();
    updateAI(abel); updateAI(caine);
    checkAbsorb(abel); checkAbsorb(caine);
    checkCollision();
    tickLog();
  }

  drawCursorGlow();
  for(const k of knowledge) drawKnowledge(k);
  drawShieldNodes();
  drawAI(abel); drawAI(caine);
  drawParticles();
  drawScreenGlitch();

  requestAnimationFrame(loop);
}

// ─────────────────────────────────
//  INIT
// ─────────────────────────────────
placeAIs(); seedKnowledge(); updateHUD();
setLog('ENTITIES INITIALIZED — AUTONOMOUS KNOWLEDGE FORAGING ACTIVE');
loop();
</script>
